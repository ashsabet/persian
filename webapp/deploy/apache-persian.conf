# Apache vhost for persian.ashkon.net
# Reverse-proxies the dynamic app to Gunicorn (127.0.0.1:8001) and serves
# static + media files directly. Enable required modules first:
#   sudo a2enmod proxy proxy_http headers ssl rewrite
#   sudo cp deploy/apache-persian.conf /etc/apache2/sites-available/persian.conf
#   sudo a2ensite persian && sudo systemctl reload apache2

<VirtualHost *:80>
    ServerName persian.ashkon.net
    # Redirect everything to HTTPS
    RewriteEngine On
    RewriteRule ^/?(.*) https://%{SERVER_NAME}/$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName persian.ashkon.net

    SSLEngine on
    # Point these at your certificate (e.g. Let's Encrypt):
    SSLCertificateFile      /etc/letsencrypt/live/persian.ashkon.net/fullchain.pem
    SSLCertificateKeyFile   /etc/letsencrypt/live/persian.ashkon.net/privkey.pem

    # Tell Django the original request was HTTPS (see SECURE_PROXY_SSL_HEADER).
    RequestHeader set X-Forwarded-Proto "https"

    # --- Static & media served straight off disk ---
    Alias /static/ /opt/persian/webapp/staticfiles/
    Alias /media/  /opt/persian/webapp/media/
    <Directory /opt/persian/webapp/staticfiles>
        Require all granted
    </Directory>
    <Directory /opt/persian/webapp/media>
        Require all granted
    </Directory>

    # --- Everything else to Gunicorn ---
    ProxyPreserveHost On
    ProxyPass        /static/ !
    ProxyPass        /media/  !
    ProxyPass        /        http://127.0.0.1:8001/
    ProxyPassReverse /        http://127.0.0.1:8001/

    ErrorLog  ${APACHE_LOG_DIR}/persian_error.log
    CustomLog ${APACHE_LOG_DIR}/persian_access.log combined
</VirtualHost>
