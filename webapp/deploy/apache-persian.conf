# Apache vhost for persian.ashkon.net
# Server-rendered Django app: everything is reverse-proxied to Gunicorn
# (127.0.0.1:8017) except /static and /media, which Apache serves off disk.
#
# Enable modules first:
#   sudo a2enmod proxy proxy_http headers ssl rewrite
#   sudo cp deploy/apache-persian.conf /etc/apache2/sites-available/persian.ashkon.net.conf
#   sudo a2ensite persian.ashkon.net && sudo systemctl reload apache2
#
# TLS: deploy this HTTP vhost first, then run
#   sudo certbot --apache -d persian.ashkon.net   (choose Redirect)
# which provisions the cert and generates persian.ashkon.net-le-ssl.conf.
# IMPORTANT: ensure the generated :443 vhost sets X-Forwarded-Proto "https"
# (certbot copies the value from the :80 block), or logins fail CSRF.

<VirtualHost *:80>
    ServerName persian.ashkon.net

    RequestHeader set X-Forwarded-Proto "https"
    ProxyPreserveHost On

    Alias /static/ /opt/persian/persian/webapp/staticfiles/
    Alias /media/  /opt/persian/persian/webapp/media/
    <Directory /opt/persian/persian/webapp/staticfiles>
        Require all granted
    </Directory>
    <Directory /opt/persian/persian/webapp/media>
        Require all granted
    </Directory>

    ProxyPass        /static/ !
    ProxyPass        /media/  !
    ProxyPass        /        http://127.0.0.1:8017/
    ProxyPassReverse /        http://127.0.0.1:8017/

    ErrorLog  ${APACHE_LOG_DIR}/persian_error.log
    CustomLog ${APACHE_LOG_DIR}/persian_access.log combined
</VirtualHost>
