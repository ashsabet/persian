{% extends "base.html" %}
{% block title %}Log in{% endblock %}
{% block content %}
  <div class="card" style="max-width:380px;margin:30px auto">
    <h2 class="center">Log in</h2>
    {% if form.errors %}<p class="errorlist">Incorrect username or password.</p>{% endif %}
    <form method="post">{% csrf_token %}
      <div class="formrow">
        <label for="id_username">Username</label>
        {{ form.username }}
      </div>
      <div class="formrow">
        <label for="id_password">Password</label>
        {{ form.password }}
      </div>
      <button type="submit" class="btn block">Log in</button>
    </form>
    <p class="center" style="margin-top:12px"><a href="{% url 'password_reset' %}">Forgot your password?</a></p>
    <p class="center muted" style="margin-top:14px">
      No account? <a href="{% url 'register' %}">Sign up</a>
    </p>
  </div>
{% endblock %}
