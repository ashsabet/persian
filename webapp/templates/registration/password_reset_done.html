{% extends "base.html" %}
{% block title %}Check your email{% endblock %}
{% block content %}
  <div class="card center" style="max-width:420px;margin:30px auto">
    <h2>Check your email 📧</h2>
    <p class="muted">If an account exists for that address, we've sent a link to reset your password.
    It may take a few minutes to arrive — check your spam folder too.</p>
    <a class="btn block" href="{% url 'login' %}">Back to log in</a>
  </div>
{% endblock %}
