{% extends "base.html" %}
{% load static %}
{% block title %}{{ lesson.title }}{% endblock %}
{% block content %}
  <div class="player-top">
    <a href="{% url 'home' %}" class="close" title="Exit">✕</a>
    <div class="progress"><i id="progress-bar"></i></div>
  </div>

  <div id="exercise" class="card"></div>

  <div style="margin-top:16px">
    <button id="check-btn" class="btn block" disabled>Check</button>
  </div>

  <div id="feedback" class="feedback">
    <div class="inner">
      <span class="msg" id="feedback-msg"></span>
      <button id="continue-btn" class="btn">Continue</button>
    </div>
  </div>

  <form id="finish-form" method="post" action="{% url 'complete_lesson' lesson.slug %}" hidden>
    {% csrf_token %}
  </form>

  {{ exercises|json_script:"exercises-data" }}
  <script>
    window.LESSON = {
      checkUrlTemplate: "{% url 'check' 0 %}".replace("/0/", "/__ID__/"),
      mediaBase: "{{ MEDIA_URL|default:'/media/' }}audio/",
      showTranslit: {{ show_translit|yesno:"true,false" }},
      csrfToken: "{{ csrf_token }}"
    };
  </script>
  <script src="{% static 'learn/js/lesson.js' %}"></script>
{% endblock %}
